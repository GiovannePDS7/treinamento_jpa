spring.application.name=aulaJPA

# =============================================
# CONFIGURAÇÕES DO BANCO DE DADOS H2 (em memória)
# =============================================
spring.datasource.url=jdbc:h2:mem:aulajpa
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =============================================
# CONFIGURAÇÕES DO JPA / HIBERNATE
# =============================================
# ddl-auto: create-drop = cria tabelas ao iniciar e apaga ao fechar
# Outras opções: none, validate, update, create
spring.jpa.hibernate.ddl-auto=create-drop

# Dialeto do banco (H2)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Mostra as queries SQL geradas pelo Hibernate no console
spring.jpa.show-sql=true

# Formata o SQL para ficar mais legível
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# CONSOLE WEB DO H2 (para visualizar o banco)
# Acesse: http://localhost:8080/h2-console
# =============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Porta do servidor
server.port=8080
